name: Deploy to CloudBase Static Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Install CloudBase CLI
      run: npm install -g @cloudbase/cli

    - name: Login CloudBase CLI
      run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

    - name: List files before deploy
      run: |
        echo "Files in dist/assets:"
        ls -la ./dist/assets/

    - name: Deploy to CloudBase Static Hosting
      run: |
        # 部署到 /shein 路径
        tcb hosting deploy ./dist /shein -e ${{ secrets.TCB_ENV_ID }}

    - name: Verify deployment
      run: |
        echo "Deployment completed. Please manually delete old files from Tencent Cloud Console if they still exist."
        echo "Old files to delete: index-D5PapHI9.css, index-DwtIO-Dh.js"
