name: CI and Deploy to Alibaba Server

on:
  pull_request:
    branches:
      - main
      - clean-main
      - codex/ozon-subproject-portal
  push:
    branches:
      - main
      - clean-main
      - codex/ozon-subproject-portal
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DEPLOY_PATH: /var/www/html/dist
  APP_PATH: /var/www/shein-guide/app
  SERVICE_NAME: shein-guide-api.service

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload dist artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Upload dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          source: "dist/*"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Upload API files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          source: "server,deploy,nginx-config.conf"
          target: ${{ env.APP_PATH }}
          overwrite: true

      - name: Switch release on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT }}
          script: |
            set -e
            DEPLOY_PATH="/var/www/html/dist"
            APP_PATH="/var/www/shein-guide/app"
            SERVICE_NAME="shein-guide-api.service"
            mkdir -p "${DEPLOY_PATH}"
            chown -R www-data:www-data "${DEPLOY_PATH}"
            find "${DEPLOY_PATH}" -type d -exec chmod 755 {} \;
            find "${DEPLOY_PATH}" -type f -exec chmod 644 {} \;
            mkdir -p "${APP_PATH}/server" "${APP_PATH}/data"
            chown -R www-data:www-data "${APP_PATH}"
            find "${APP_PATH}" -type d -exec chmod 755 {} \;
            find "${APP_PATH}" -type f -exec chmod 644 {} \;
            cp "${APP_PATH}/deploy/shein-guide-api.service" "/etc/systemd/system/${SERVICE_NAME}"
            chmod 644 "/etc/systemd/system/${SERVICE_NAME}"
            cp "${APP_PATH}/nginx-config.conf" /etc/nginx/sites-available/zeyikuajing.com.conf
            systemctl daemon-reload
            systemctl enable "${SERVICE_NAME}"
            systemctl restart "${SERVICE_NAME}"
            nginx -t
            systemctl reload nginx
